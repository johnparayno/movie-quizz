<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FFE5D9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="quiz">
  <title>quiz</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="styles.css?v=2.0.3">
</head>
<body>
  <!-- Info icon: upper right corner (below status bar for PWA on iPhone) -->
  <button id="info-btn" type="button" class="info-btn" aria-label="Show how to play" aria-expanded="false" aria-haspopup="dialog">
    <span aria-hidden="true">ℹ️</span>
  </button>
  <!-- Info overlay: how to play -->
  <div id="info-overlay" class="info-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="info-overlay-title">
    <div class="info-overlay-content">
      <h2 id="info-overlay-title">How to play</h2>
      <p>Read the movie quote and tap the correct answer. Score points for each correct guess. Have fun!</p>
      <button id="info-close" type="button" class="info-close-btn" aria-label="Close">Close</button>
    </div>
  </div>
  <main role="main" aria-live="polite" class="bg-variant-0">
    <!-- T023: Loading state -->
    <div id="loading-state" class="state-panel loading-state" aria-live="polite">
      <p class="loading-text">Loading…</p>
    </div>
    <!-- T024: Error state -->
    <div id="error-state" class="state-panel error-state hidden">
      <p class="error-message">Something went wrong. Please try again.</p>
      <button id="retry-fetch" type="button" aria-label="Retry loading content">Retry</button>
    </div>
    <!-- T025: Empty state -->
    <div id="empty-state" class="state-panel empty-state hidden">
      <p class="empty-message">No content available.</p>
    </div>
    <!-- Content display (T029: aria-live announces new content to screen readers) -->
    <blockquote id="content-block" class="content-block hidden" aria-live="polite" aria-atomic="true">
      <p id="content-text" class="content-text"></p>
    </blockquote>
    <div class="answer-buttons">
      <button id="answer-1" type="button" aria-label="Answer option 1"></button>
      <button id="answer-2" type="button" aria-label="Answer option 2"></button>
      <button id="answer-3" type="button" aria-label="Answer option 3"></button>
    </div>
    <!-- Vote feedback overlays (confetti / booh) -->
    <div id="vote-feedback-overlay" class="vote-feedback-overlay hidden" aria-hidden="true">
      <button id="next-skip-btn" type="button" class="next-skip-btn" aria-label="Next question">→</button>
      <canvas id="confetti-canvas"></canvas>
      <div id="booh-feedback" class="booh-feedback hidden">
        <span class="booh-emoji">😢</span>
        <span class="booh-text">booh</span>
      </div>
      <div id="wrong-feedback" class="booh-feedback hidden">
        <span class="booh-emoji">😢</span>
        <span class="wrong-text">wrong</span>
      </div>
    </div>
    <!-- T026: Vote failure overlay -->
    <div id="vote-error-overlay" class="vote-error-overlay hidden">
      <p>Vote failed. Please try again.</p>
      <button id="retry-vote" type="button" aria-label="Retry vote">Retry vote</button>
    </div>
  </main>
  <span id="score-display" class="score-display" aria-live="polite">SCORE: 0</span>
  <!-- Version: 2.0.3 — frontend-only PWA -->
  <span class="version" aria-hidden="true">v2.0.3</span>
  <script src="app.js?v=2.0.3"></script>
</body>
</html>
